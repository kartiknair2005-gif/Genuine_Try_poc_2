name: 'Trigger E2E (lab)'

on:
  pull_request:
  workflow_dispatch:
    inputs:
      repo_name: { description: 'owner/repo', required: true, type: 'string' }
      head_sha:  { description: 'sha/ref',    required: true, type: 'string' }

permissions:
  contents: 'read'

jobs:
  save_repo_name:
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Save repo + sha into artifact'
        env:
          REPO_NAME: '${{ github.event.inputs.repo_name || github.event.pull_request.head.repo.full_name }}'
          HEAD_SHA:  '${{ github.event.inputs.head_sha  || github.event.pull_request.head.sha }}'
        run: |
          mkdir -p ./pr
          echo "${REPO_NAME}" > ./pr/repo_name
          echo "${HEAD_SHA}"  > ./pr/head_sha
          echo "::notice::Wrote repo_name=${REPO_NAME} head_sha=${HEAD_SHA}"
      - uses: 'actions/upload-artifact@v4'
        with:
          name: 'repo_name'
          path: 'pr/'
